services:
  static-info-service:
    container_name: sandol_static_info_service
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY:-changeme}
    volumes:
      - ./:/app
    networks:
      - sandol_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/static-info/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "7"
    ports:
      - "8000:80"

networks:
  sandol_network:
    driver: bridge
